version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trace-demo-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - YOUTUBE_FFMPEG_DIR=/usr/bin
    volumes:
      - ./data:/app/data
      - ./backend/data.db:/app/backend/data.db
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: trace-demo-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
